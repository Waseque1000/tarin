<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hey You 💖</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --rose: #ff6b9d;
        --blush: #ffb3cc;
        --lavender: #c084fc;
        --deep: #1a0a2e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        background: radial-gradient(
          ellipse at 20% 50%,
          #2d0a4e 0%,
          #1a0a2e 40%,
          #0d0520 100%
        );
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
        cursor: none;
      }
      .cursor {
        position: fixed;
        width: 18px;
        height: 18px;
        background: rgba(255, 107, 157, 0.8);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 12px rgba(255, 107, 157, 0.6);
        transition:
          width 0.2s,
          height 0.2s;
      }
      .cursor-trail {
        position: fixed;
        width: 8px;
        height: 8px;
        background: rgba(192, 132, 252, 0.5);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition: all 0.15s ease;
      }
      #particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .heart-container {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
      }
      .float-heart {
        position: absolute;
        bottom: -60px;
        animation: floatUp linear infinite;
        opacity: 0;
      }
      @keyframes floatUp {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 0.7;
        }
        90% {
          opacity: 0.4;
        }
        100% {
          transform: translateY(-110vh) rotate(360deg);
          opacity: 0;
        }
      }
      .scene {
        position: relative;
        z-index: 10;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 32px;
        padding: 3.5rem 3rem;
        max-width: 520px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 8px 60px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: visible;
      }
      .card::before {
        content: "";
        position: absolute;
        top: -2px;
        left: 10%;
        right: 10%;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--rose),
          var(--lavender),
          transparent
        );
        border-radius: 2px;
      }
      .name-tag {
        font-family: "Pacifico", cursive;
        font-size: 0.9rem;
        color: var(--blush);
        letter-spacing: 0.12em;
        margin-bottom: 1.5rem;
        opacity: 0.85;
      }
      .big-emoji {
        font-size: 4rem;
        display: block;
        margin-bottom: 1rem;
        animation: pulse-emoji 2s ease-in-out infinite;
      }
      @keyframes pulse-emoji {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.12) rotate(-5deg);
        }
      }
      .question {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        color: #fff;
        line-height: 1.3;
        margin-bottom: 0.6rem;
        font-style: italic;
      }
      .question span {
        color: var(--rose);
        font-style: normal;
      }
      .btn-row {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 1.8rem;
        min-height: 56px;
        align-items: center;
      }
      .btn {
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
        font-size: 1.05rem;
        padding: 0.85rem 2.2rem;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        position: relative;
        overflow: hidden;
        letter-spacing: 0.03em;
      }
      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.15);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .btn:hover::after {
        opacity: 1;
      }
      .btn:hover {
        transform: scale(1.08) translateY(-3px);
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-yes {
        background: linear-gradient(135deg, #ff6b9d, #e040a0);
        color: #fff;
        animation: glow-pulse 2.5s ease-in-out infinite;
      }
      @keyframes glow-pulse {
        0%,
        100% {
          box-shadow: 0 4px 20px rgba(255, 107, 157, 0.45);
        }
        50% {
          box-shadow:
            0 4px 30px rgba(255, 107, 157, 0.7),
            0 0 20px rgba(255, 107, 157, 0.3);
        }
      }
      .btn-no {
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        position: relative;
        z-index: 20;
      }
      .btn-no:hover {
        border-color: rgba(255, 255, 255, 0.5);
        color: #fff;
      }

      /* SCREENS */
      .response-screen {
        display: none;
        flex-direction: column;
        align-items: center;
      }
      .response-screen.active {
        display: flex;
      }
      .response-emoji {
        font-size: 5rem;
        margin-bottom: 1rem;
        animation: bounce-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes bounce-in {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .response-msg {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.1rem, 3vw, 1.5rem);
        color: #fff;
        line-height: 1.6;
        margin-bottom: 0.8rem;
        font-style: italic;
      }
      .response-sub {
        font-size: 0.92rem;
        color: rgba(255, 179, 204, 0.7);
        margin-bottom: 2rem;
        line-height: 1.6;
      }
      .final-note {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.3);
        font-style: italic;
        margin-top: 1.5rem;
        padding-top: 1.2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .reset-btn {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.35);
        background: none;
        border: none;
        cursor: pointer;
        text-decoration: underline;
        margin-top: 0.8rem;
        font-family: "DM Sans", sans-serif;
        transition: color 0.2s;
      }
      .reset-btn:hover {
        color: rgba(255, 255, 255, 0.6);
      }
      .main-screen {
        transition:
          opacity 0.25s,
          transform 0.25s;
      }
      .main-screen.hidden {
        opacity: 0;
        transform: scale(0.9);
        pointer-events: none;
        display: none;
      }

      /* Confetti */
      .confetti-piece {
        position: fixed;
        width: 10px;
        height: 10px;
        pointer-events: none;
        z-index: 100;
        border-radius: 2px;
        animation: confetti-fall 1.5s ease-out forwards;
      }
      @keyframes confetti-fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(60vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* NO dodge shake */
      @keyframes noshake {
        0% {
          transform: var(--pos) rotate(0deg);
        }
        20% {
          transform: var(--pos) translateX(-10px) rotate(-4deg);
        }
        40% {
          transform: var(--pos) translateX(10px) rotate(4deg);
        }
        70% {
          transform: var(--pos) translateX(-6px);
        }
        100% {
          transform: var(--pos);
        }
      }
      .btn-no.shaking {
        animation: noshake 0.18s ease-out forwards !important;
      }

      .music-btn {
        position: fixed;
        top: 1.2rem;
        right: 1.2rem;
        z-index: 50;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1.2rem;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
      }
      .music-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: scale(1.1);
      }
      .typing-text::after {
        content: "|";
        animation: blink 0.7s step-end infinite;
        color: var(--rose);
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @media (max-width: 480px) {
        .card {
          padding: 2.5rem 1.8rem;
          border-radius: 24px;
        }
        .btn {
          padding: 0.8rem 1.8rem;
          font-size: 0.98rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-trail" id="cursorTrail"></div>
    <canvas id="particles"></canvas>
    <div class="heart-container" id="heartContainer"></div>
    <button class="music-btn" id="musicBtn">🎵</button>

    <div class="scene">
      <div class="card" id="mainCard">
        <div class="main-screen" id="mainScreen">
          <div class="name-tag">✦ hey, Tarin 👋 ✦</div>
          <span class="big-emoji">💌</span>
          <h1 class="question">
            Do you wanna talk<br />with me? <span>❤️</span>
          </h1>
          <div class="btn-row">
            <button class="btn btn-yes" id="btnYes" onclick="handleYes()">
              YES 💖
            </button>
            <button class="btn btn-no" id="btnNo" onclick="handleNo()">
              NO 🙈
            </button>
          </div>
          <p class="final-note">
            No matter what you choose… I just want to spend time with you ❤️
          </p>
        </div>

        <div class="response-screen" id="yesScreen">
          <div class="response-emoji">😍</div>
          <h2 class="response-msg" id="yesMsg"></h2>
          <p class="final-note">
            No matter what you choose… I just want to spend time with you ❤️
          </p>
          <button class="reset-btn" onclick="reset()">↩ go back</button>
        </div>

        <div class="response-screen" id="noScreen">
          <div class="response-emoji">😌</div>
          <h2 class="response-msg" id="noMsg"></h2>
          <p class="response-sub">তোমার গল্প শুনতে সবসময় ভালো লাগে 🫶</p>
          <p class="final-note">
            No matter what you choose… I just want to spend time with you ❤️
          </p>
          <button class="reset-btn" onclick="reset()">↩ go back</button>
        </div>
      </div>
    </div>

    <audio id="bgMusic" loop>
      <source
        src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        type="audio/mpeg"
      />
    </audio>

    <script>
      // Cursor
      const cursor = document.getElementById("cursor");
      const trail = document.getElementById("cursorTrail");
      let mx = 0,
        my = 0,
        tx = 0,
        ty = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        cursor.style.left = mx + "px";
        cursor.style.top = my + "px";
      });
      setInterval(() => {
        tx += (mx - tx) * 0.2;
        ty += (my - ty) * 0.2;
        trail.style.left = tx + "px";
        trail.style.top = ty + "px";
      }, 16);
      document.addEventListener("mousedown", () => {
        cursor.style.width = "24px";
        cursor.style.height = "24px";
      });
      document.addEventListener("mouseup", () => {
        cursor.style.width = "18px";
        cursor.style.height = "18px";
      });

      // Particles
      const canvas = document.getElementById("particles"),
        ctx = canvas.getContext("2d");
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      window.addEventListener("resize", () => {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      });
      const pts = Array.from({ length: 60 }, () => ({
        x: Math.random() * innerWidth,
        y: Math.random() * innerHeight,
        r: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        a: Math.random() * 0.5 + 0.1,
      }));
      (function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pts.forEach((p) => {
          p.x += p.dx;
          p.y += p.dy;
          if (p.x < 0) p.x = canvas.width;
          if (p.x > canvas.width) p.x = 0;
          if (p.y < 0) p.y = canvas.height;
          if (p.y > canvas.height) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,107,157,${p.a})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      })();

      // Hearts
      const hc = document.getElementById("heartContainer");
      const hEmoji = ["❤️", "💖", "💗", "💓", "💘", "🌸", "✨", "💕"];
      function spawnHeart() {
        const el = document.createElement("div");
        el.className = "float-heart";
        el.textContent = hEmoji[Math.floor(Math.random() * hEmoji.length)];
        el.style.left = Math.random() * 100 + "vw";
        const d = 7 + Math.random() * 8;
        el.style.animationDuration = d + "s";
        el.style.fontSize = 0.8 + Math.random() * 1.2 + "rem";
        el.style.animationDelay = Math.random() * 3 + "s";
        hc.appendChild(el);
        setTimeout(() => el.remove(), (d + 3) * 1000);
      }
      setInterval(spawnHeart, 800);
      for (let i = 0; i < 8; i++) spawnHeart();

      // Music
      const music = document.getElementById("bgMusic"),
        musicBtn = document.getElementById("musicBtn");
      let playing = false;
      musicBtn.onclick = () => {
        if (playing) {
          music.pause();
          musicBtn.textContent = "🎵";
          playing = false;
        } else {
          music.play().catch(() => {});
          musicBtn.textContent = "🔇";
          playing = true;
        }
      };

      // Click sound
      function playClick() {
        try {
          const ac = new (window.AudioContext || window.webkitAudioContext)();
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.connect(g);
          g.connect(ac.destination);
          o.frequency.setValueAtTime(880, ac.currentTime);
          o.frequency.exponentialRampToValueAtTime(440, ac.currentTime + 0.15);
          g.gain.setValueAtTime(0.3, ac.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
          o.start();
          o.stop(ac.currentTime + 0.3);
        } catch (e) {}
      }

      // Confetti
      function launchConfetti(x, y) {
        const cols = [
          "#ff6b9d",
          "#c084fc",
          "#ffb3cc",
          "#ffd700",
          "#ff9ef1",
          "#a78bfa",
        ];
        for (let i = 0; i < 40; i++) {
          const p = document.createElement("div");
          p.className = "confetti-piece";
          p.style.left = x + "px";
          p.style.top = y + "px";
          p.style.background = cols[Math.floor(Math.random() * cols.length)];
          p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
          p.style.transform = `translate(${(Math.random() - 0.5) * 200}px,${-Math.random() * 100}px) rotate(${Math.random() * 360}deg)`;
          p.style.animationDuration = 1 + Math.random() + "s";
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 2500);
        }
      }

      // Type text
      function typeText(el, text) {
        el.textContent = "";
        el.classList.add("typing-text");
        let i = 0;
        const iv = setInterval(() => {
          el.textContent += text[i++];
          if (i >= text.length) {
            clearInterval(iv);
            el.classList.remove("typing-text");
          }
        }, 35);
      }

      // ── YES ──
      function handleYes() {
        playClick();
        const r = document.getElementById("btnYes").getBoundingClientRect();
        launchConfetti(r.left + r.width / 2, r.top);
        document.getElementById("mainScreen").classList.add("hidden");
        setTimeout(() => {
          document.getElementById("yesScreen").classList.add("active");
          typeText(
            document.getElementById("yesMsg"),
            "Yayyy 😍 Let's go to TSC and have some tea together ☕❤️",
          );
          for (let i = 0; i < 6; i++) setTimeout(spawnHeart, i * 150);
        }, 200);
      }

      // ── NO — instantly shows response on FIRST click, no dodging ──
      function handleNo() {
        playClick();
        // Quick visual flash on the button before switching
        const btnNo = document.getElementById("btnNo");
        btnNo.style.transition = "transform .08s ease";
        btnNo.style.transform = "scale(.9)";
        setTimeout(() => {
          btnNo.style.transform = "scale(1)";
        }, 80);

        document.getElementById("mainScreen").classList.add("hidden");
        setTimeout(() => {
          document.getElementById("noScreen").classList.add("active");
          typeText(
            document.getElementById("noMsg"),
            "চলো TSC যাই আর চা খাই আর তোমার মারা খাওয়ার গল্প শুনি 🫶😌❤️",
          );
        }, 150); // only 150ms delay — feels instant
      }

      function reset() {
        playClick();
        document.getElementById("yesScreen").classList.remove("active");
        document.getElementById("noScreen").classList.remove("active");
        const ms = document.getElementById("mainScreen");
        ms.classList.remove("hidden");
        ms.style.display = "";
        const btnNo = document.getElementById("btnNo");
        btnNo.style.transition = "none";
        btnNo.style.transform = "";
      }
    </script>
  </body>
</html>
